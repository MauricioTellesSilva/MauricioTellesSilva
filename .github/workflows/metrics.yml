name: Update Profile README Text Stats
on:
  schedule:
    - cron: "0 */12 * * *" # Atualiza a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente
  push:
    branches: ["main", "master"]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Custom Text
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import time

          token = os.getenv("GH_TOKEN")
          username = os.getenv("GH_USERNAME")
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}

          # Localiza o arquivo README
          readme_file = None
          for f in os.listdir("."):
              if f.lower() == "readme.md":
                  readme_file = f
                  break
          
          if not readme_file:
              print("Erro crítico: Nenhum arquivo README.md foi encontrado!")
              exit(1)

          # 1. Buscar total de Commits e Pull Requests globais via API de Busca
          search_commits_count = 0
          try:
              commit_search = requests.get(f"https://api.github.com/search/commits?q=author:{username}", headers=headers).json()
              if isinstance(commit_search, dict) and "total_count" in commit_search:
                  search_commits_count = commit_search["total_count"]
          except Exception as e:
              print(f"Aviso ao buscar commits via search: {e}")

          total_prs = "Disponível no painel"
          try:
              pr_search = requests.get(f"https://api.github.com/search/issues?q=author:{username}+type:pr", headers=headers).json()
              if isinstance(pr_search, dict) and "total_count" in pr_search:
                  total_prs = pr_search["total_count"]
          except Exception as e:
              print(f"Aviso ao buscar PRs: {e}")

          # 2. Paginação abrangente de repositórios (Públicos, Privados, Colaborações e Organizações)
          repos = []
          page = 1
          
          # Tenta usar a rota autenticada do usuário ativo para maior abrangência
          resp = requests.get(f"https://api.github.com/user/repos?per_page=100&affiliation=owner,collaborator,organization_member&page={page}", headers=headers)
          if resp.status_code == 200:
              while True:
                  data = resp.json()
                  if not data or not isinstance(data, list):
                      break
                  repos.extend(data)
                  if len(data) < 100:
                      break
                  page += 1
                  resp = requests.get(f"https://api.github.com/user/repos?per_page=100&affiliation=owner,collaborator,organization_member&page={page}", headers=headers)
          else:
              print("Aviso: Rota privada indisponível. Usando fallback de repositórios públicos...")
              while True:
                  resp = requests.get(f"https://api.github.com/users/{username}/repos?per_page=100&page={page}", headers=headers)
                  if resp.status_code != 200:
                      break
                  data = resp.json()
                  if not data or not isinstance(data, list):
                      break
                  repos.extend(data)
                  if len(data) < 100:
                      break
                  page += 1

          total_additions = 0
          total_deletions = 0
          total_commits_from_stats = 0
          languages_map = {}

          print(f"Varrendo um total de {len(repos)} repositórios encontrados...")

          # 3. Análise profunda de cada repositório com correção de maiúsculas/minúsculas (.lower())
          for repo in repos:
              if repo.get("fork"): 
                  continue
              repo_name = repo.get("name")
              repo_owner = repo.get("owner", {}).get("login", username)
              
              # Loop adaptativo de repetição para aguardar o cache de estatísticas (Resposta 202 do GitHub)
              stats_data = None
              stats_url = f"https://api.github.com/repos/{repo_owner}/{repo_name}/stats/contributors"
              
              for retry in range(5): # Até 5 tentativas com maior tempo de folga
                  try:
                      stats_resp = requests.get(stats_url, headers=headers)
                      if stats_resp.status_code == 200:
                          stats_data = stats_resp.json()
                          break
                      elif stats_resp.status_code == 202:
                          print(f"-> GitHub compilando dados de [{repo_name}]. Aguardando 3s... (Tentativa {retry+1}/5)")
                          time.sleep(3)
                      else:
                          break
                  except Exception as e:
                      print(f"Erro de conexão no repositório {repo_name}: {e}")
                      break

              # Processamento dos dados numéricos coletados
              if isinstance(stats_data, list):
                  for contributor in stats_data:
                      if isinstance(contributor, dict):
                          login_api = contributor.get("author", {}).get("login", "")
                          # correcao: Comparação em lowercase evita ignorar seus dados por conflito de maiúsculas
                          if login_api.lower() == username.lower():
                              for week in contributor.get("weeks", []):
                                  total_additions += week.get("a", 0)
                                  total_deletions += week.get("d", 0)
                                  total_commits_from_stats += week.get("c", 0)
              
              # Coleta volumétrica das linguagens de programação
              try:
                  lang_url = f"https://api.github.com/repos/{repo_owner}/{repo_name}/languages"
                  lang_resp = requests.get(lang_url, headers=headers)
                  if lang_resp.status_code == 200:
                      lang_data = lang_resp.json()
                      if isinstance(lang_data, dict):
                          for lang, bytes_count in lang_data.items():
                              languages_map[lang] = languages_map.get(lang, 0) + bytes_count
              except Exception as e:
                  print(f"Erro ao processar linguagens do repo {repo_name}: {e}")

          # Define o teto máximo de commits detectados para consistência
          final_commits = max(search_commits_count, total_commits_from_stats)
          if final_commits == 0 and search_commits_count == 0:
              final_commits = "Disponível no painel"

          # Processamento do ranking de linguagens dominantes
          total_bytes = sum(languages_map.values())
          sorted_langs = sorted(languages_map.items(), key=lambda x: x[1], reverse=True)[:4]
          lang_text = []
          for lang, bytes_count in sorted_langs:
              percentage = (bytes_count / total_bytes) * 100 if total_bytes > 0 else 0
              lang_text.append(f"{lang} ({percentage:.1f}%)")
          
          languages_formatted = ", ".join(lang_text) if lang_text else "Identificando..."

          # Montagem segura das strings de linhas com LaTeX
          str_additions = "{:,}".format(total_additions)
          str_deletions = "{:,}".format(total_deletions)
          verde_add = "$\\color{#2ea44f}{\\mathbf{+" + str_additions + "}}$"
          vermelho_del = "$\\color{#f85149}{\\mathbf{-" + str_deletions + "}}$"

          # Template bruto estruturado
           custom_text = f"""### 📈 Minhas Estatísticas de Desenvolvimento


          * 🚀 **Repositorios:** Já contribuí com um total de **{total_commits} commits**.
          * 🔀 **Pulls:** Foram abertos **{total_prs} Pull Requests**.
          * 📊 **Commits:** nos meus repositórios, movimentei um total de {verde_add} **linhas adicionadas** e {vermelho_del} **linhas removidas**.
          * 💻 **linguagens utilizadas:** Participacao de linguagens utilizadas:**{languages_formatted}**.


          _Atualizado automaticamente via Python Script (metrics.yml)._
          """
          # Formata limpando indentações indesejadas geradas pelo heredoc do terminal
          custom_text = "\n".join([line.strip() for line in custom_text_raw.strip().split("\n")])

          # Anti copia
          with open(readme_file, "r", encoding="utf-8") as f:
              readme_content = f.read()

          start_tag = ""
          end_tag = ""

          # Se houver qualquer bagunça ou duplicados, limpamos tudo do arquivo antes de injetar o novo
          if start_tag in readme_content and end_tag in readme_content:
              parts = readme_content.split(start_tag, 1)
              before_stats = parts[0]
              after_start = parts[1]
              
              if end_tag in after_start:
                  after_stats_parts = after_start.split(end_tag, 1)
                  after_stats = after_stats_parts[1]
                  
                  # Remove qualquer outra tag orfã ou duplicada perdida pelo arquivo
                  before_stats = before_stats.replace(start_tag, "").replace(end_tag, "")
                  after_stats = after_stats.replace(start_tag, "").replace(end_tag, "")
                  
                  updated_content = before_stats.rstrip() + "\n\n" + custom_text + "\n\n" + after_stats.lstrip()
              else:
                  readme_content = readme_content.replace(start_tag, "").replace(end_tag, "")
                  updated_content = readme_content.rstrip() + "\n\n" + custom_text
          else:
              readme_content = readme_content.replace(start_tag, "").replace(end_tag, "")
              updated_content = readme_content.rstrip() + "\n\n" + custom_text

          # Escreve o resultado perfeitamente limpo de volta
          with open(readme_file, "w", encoding="utf-8") as f:
              f.write(updated_content)
          print("README.md atualizado com sucesso e livre de duplicatas!")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: atualiza estatísticas globais de texto [skip ci]"
          git push