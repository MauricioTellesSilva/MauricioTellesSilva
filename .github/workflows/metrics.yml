name: Update Profile README Text Stats
on:
  schedule:
    - cron: "0 */6 * * *" # Atualiza a cada 6 horas
  workflow_dispatch: # Permite rodar manualmente
  push:
    branches: ["main", "master"]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Custom Text
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import re
          import time

          token = os.getenv("GH_TOKEN")
          username = os.getenv("GH_USERNAME")
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}

          # Localiza o arquivo README
          readme_file = None
          for f in os.listdir("."):
              if f.lower() == "readme.md":
                  readme_file = f
                  break
          
          if not readme_file:
              print("Erro crítico: Nenhum arquivo README.md foi encontrado!")
              exit(1)

          # 1. Buscar total de Commits e Pull Requests globais via Search API
          search_commits_count = 0
          try:
              commit_search = requests.get(f"https://api.github.com/search/commits?q=author:{username}", headers=headers).json()
              if isinstance(commit_search, dict) and "total_count" in commit_search:
                  search_commits_count = commit_search["total_count"]
          except Exception as e:
              print(f"Aviso ao buscar commits via search: {e}")

          total_prs = "Disponível no painel"
          try:
              pr_search = requests.get(f"https://api.github.com/search/issues?q=author:{username}+type:pr", headers=headers).json()
              if isinstance(pr_search, dict) and "total_count" in pr_search:
                  total_prs = pr_search["total_count"]
          except Exception as e:
              print(f"Aviso ao buscar PRs: {e}")

          # 2. Paginação para buscar repositórios (Tenta incluir privados se o token permitir)
          repos = []
          page = 1
          base_url = "https://api.github.com/user/repos?type=owner&"
          test_resp = requests.get(base_url + "per_page=1", headers=headers)
          if test_resp.status_code != 200:
              base_url = f"https://api.github.com/users/{username}/repos?"

          while True:
              try:
                  repos_url = f"{base_url}per_page=100&page={page}"
                  resp = requests.get(repos_url, headers=headers)
                  if resp.status_code != 200:
                      break
                  data = resp.json()
                  if not data or not isinstance(data, list):
                      break
                  repos.extend(data)
                  if len(data) < 100:
                      break
                  page += 1
              except Exception as e:
                  print(f"Erro ao paginar repositórios: {e}")
                  break

          total_additions = 0
          total_deletions = 0
          total_commits_from_stats = 0
          languages_map = {}

          # 3. Varrer o histórico de cada repositório com tratamento para cache (Erro 202)
          for repo in repos:
              if repo.get("fork"): 
                  continue
              repo_name = repo.get("name")
              repo_owner = repo.get("owner", {}).get("login", username)
              
              # Loop de tentativa para lidar com o cache de estatísticas do GitHub (Resposta 202)
              stats_data = None
              stats_url = f"https://api.github.com/repos/{repo_owner}/{repo_name}/stats/contributors"
              for retry in range(3):
                  try:
                      stats_resp = requests.get(stats_url, headers=headers)
                      if stats_resp.status_code == 200:
                          stats_data = stats_resp.json()
                          break
                      elif stats_resp.status_code == 202:
                          print(f"GitHub está gerando os dados para {repo_name}, aguardando...")
                          time.sleep(2)
                      else:
                          break
                  except Exception as e:
                      print(f"Erro de conexão no repo {repo_name}: {e}")
                      break

              if isinstance(stats_data, list):
                  for contributor in stats_data:
                      if isinstance(contributor, dict) and contributor.get("author", {}).get("login") == username:
                          for week in contributor.get("weeks", []):
                              total_additions += week.get("a", 0)
                              total_deletions += week.get("d", 0)
                              total_commits_from_stats += week.get("c", 0)
              
              # Buscar dados de linguagens
              try:
                  lang_url = f"https://api.github.com/repos/{repo_owner}/{repo_name}/languages"
                  lang_resp = requests.get(lang_url, headers=headers)
                  if lang_resp.status_code == 200:
                      lang_data = lang_resp.json()
                      if isinstance(lang_data, dict):
                          for lang, bytes_count in lang_data.items():
                              languages_map[lang] = languages_map.get(lang, 0) + bytes_count
              except Exception as e:
                  print(f"Erro de linguagem no repo {repo_name}: {e}")

          # Definir o melhor número de commits encontrado
          final_commits = max(search_commits_count, total_commits_from_stats)
          if final_commits == 0 and search_commits_count == 0:
              final_commits = "Disponível no painel"

          # Calcular porcentagem global das linguagens
          total_bytes = sum(languages_map.values())
          sorted_langs = sorted(languages_map.items(), key=lambda x: x[1], reverse=True)[:4]
          lang_text = []
          for lang, bytes_count in sorted_langs:
              percentage = (bytes_count / total_bytes) * 100 if total_bytes > 0 else 0
              lang_text.append(f"{lang} ({percentage:.1f}%)")
          
          languages_formatted = ", ".join(lang_text) if lang_text else "Identificando..."

          # Formatação das strings numéricas e blocos LaTeX
          str_additions = "{:,}".format(total_additions)
          str_deletions = "{:,}".format(total_deletions)
          verde_add = "$\\color{#2ea44f}{\\mathbf{+" + str_additions + "}}$"
          vermelho_del = "$\\color{#f85149}{\\mathbf{-" + str_deletions + "}}$"

          # Template bruto do texto final
           custom_text = f"""### 📈 Minhas Estatísticas de Desenvolvimento


          * 🚀 **Repositorios:** Já contribuí com um total de **{total_commits} commits**.
          * 🔀 **Pulls:** Foram abertos **{total_prs} Pull Requests**.
          * 📊 **Commits:** nos meus repositórios, movimentei um total de {verde_add} **linhas adicionadas** e {vermelho_del} **linhas removidas**.
          * 💻 **linguagens utilizadas:** Participacao de linguagens utilizadas:**{languages_formatted}**.


          _Atualizado automaticamente via Python Script (metrics.yml)._
          """

          
          custom_text = "\n".join([line.strip() for line in custom_text_raw.split("\n")])

          # Leitura do README atual
          with open(readme_file, "r", encoding="utf-8") as f:
              readme_content = f.read()

          pattern = r".*?"
          
          # Anti clone (commit tentativa 4 cores)
          if readme_content.count("") > 1:
              print("Detectados blocos duplicados antigos. Resetando e limpando o README...")
              readme_content = re.sub(pattern, "", readme_content, flags=re.DOTALL)
              updated_content = readme_content.rstrip() + "\n\n" + custom_text
          else:
              if not re.search(pattern, readme_content, flags=re.DOTALL):
                  # Se não existirem as tags, anexa ao final
                  updated_content = readme_content.rstrip() + "\n\n" + custom_text
              else:
                  # Substituição segura usando lambda
                  updated_content = re.sub(pattern, lambda m: custom_text, readme_content, flags=re.DOTALL)

          # Salva o arquivo corrigido
          with open(readme_file, "w", encoding="utf-8") as f:
              f.write(updated_content)
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: atualiza estatísticas globais de texto [skip ci]"
          git push