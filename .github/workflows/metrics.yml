name: Update Profile README Text Stats
on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Custom Text
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import re
          import time

          token = os.getenv("GH_TOKEN")
          username = os.getenv("GH_USERNAME")
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}

          readme_file = None
          for f in os.listdir("."):
              if f.lower() == "readme.md":
                  readme_file = f
                  break
          
          if not readme_file:
              print("Erro: README.md não encontrado!")
              exit(1)

          # 1. Buscar dados de Commits e PRs via Search API (Global)
          search_commits_count = 0
          try:
              commit_search = requests.get(f"https://api.github.com/search/commits?q=author:{username}", headers=headers).json()
              if isinstance(commit_search, dict) and "total_count" in commit_search:
                  search_commits_count = commit_search["total_count"]
          except:
              pass

          total_prs = "Disponível no painel"
          try:
              pr_search = requests.get(f"https://api.github.com/search/issues?q=author:{username}+type:pr", headers=headers).json()
              if isinstance(pr_search, dict) and "total_count" in pr_search:
                  total_prs = pr_search["total_count"]
          except:
              pass

          # 2. Varredura e mapeamento seletivo de repositórios (Excluindo Alvo)
          unique_repos = set()
          page = 1
          while True:
              resp = requests.get(f"https://api.github.com/user/repos?per_page=100&page={page}", headers=headers)
              if resp.status_code != 200 or not resp.json():
                  break
              for r in resp.json():
                  # Condicional estrita para ignorar forks e o repositório específico
                  if not r.get("fork") and r["name"] != "MauricioTellesSilva":
                      unique_repos.add((r["name"], r["owner"]["login"]))
              page += 1

          total_additions = 0
          total_deletions = 0
          languages_map = {}

          # 3. Extração de métricas por repositório filtrado
          for repo_name, repo_owner in unique_repos:
              try:
                  resp = requests.get(f"https://api.github.com/repos/{repo_owner}/{repo_name}/stats/contributors", headers=headers)
                  
                  # Tratamento para o cache (HTTP 202 Accepted) do GitHub
                  if resp.status_code == 202:
                      time.sleep(2.5)
                      resp = requests.get(f"https://api.github.com/repos/{repo_owner}/{repo_name}/stats/contributors", headers=headers)

                  if resp.status_code == 200 and resp.json():
                      for contributor in resp.json():
                          if contributor.get("author", {}).get("login", "").lower() == username.lower():
                              for week in contributor.get("weeks", []):
                                  total_additions += week.get("a", 0)
                                  total_deletions += week.get("d", 0)
              except:
                  pass

              # Coleta de volumetria de linguagens
              try:
                  lang_resp = requests.get(f"https://api.github.com/repos/{repo_owner}/{repo_name}/languages", headers=headers)
                  if lang_resp.status_code == 200:
                      for lang, bytes_count in lang_resp.json().items():
                          languages_map[lang] = languages_map.get(lang, 0) + bytes_count
              except:
                  pass

          # 4. Processamento do Top 4 de linguagens dominantes
          total_bytes = sum(languages_map.values())
          sorted_langs = sorted(languages_map.items(), key=lambda x: x[1], reverse=True)[:4]
          lang_text = [f"{lang} ({(bytes_count / total_bytes) * 100:.1f}%)" for lang, bytes_count in sorted_langs if total_bytes > 0]
          languages_formatted = ", ".join(lang_text) if lang_text else "Identificando..."

          # 5. Formatação visual (Milhar e Cores via LaTeX)
          str_additions = "{:,}".format(total_additions)
          str_deletions = "{:,}".format(total_deletions)
          verde_add = "$\\color{#2ea44f}{\\mathbf{+" + str_additions + "}}$"
          vermelho_del = "$\\color{#f85149}{\\mathbf{-" + str_deletions + "}}$"

          # 6. Template de injeção Markdown
          stats_content = f"""### 📈 Minhas Estatísticas de Desenvolvimento


          * 🚀 **Repositorios:** Já contribuí com um total de **{search_commits_count} commits**.
          * 🔀 **Pulls:** Foram abertos **{total_prs} Pull Requests**.
          * 📊 **Commits:** nos meus repositórios, movimentei um total de {verde_add} **linhas adicionadas** e {vermelho_del} **linhas removidas**.
          * 💻 **linguagens utilizadas:** Participacao de linguagens utilizadas:**{languages_formatted}**.


          _Atualizado automaticamente via Python Script (metrics.yml)._
          """




          # 7. Parser Posicional e Escrita Segura
          with open(readme_file, "r", encoding="utf-8") as f:
              readme_content = f.read()

          tag_start = ""
          tag_end = ""

          if tag_start in readme_content and tag_end in readme_content:
              # Localiza os índices exatos de início e fim dos delimitadores
              start_idx = readme_content.find(tag_start) + len(tag_start)
              end_idx = readme_content.find(tag_end)
              
              # Garante que a ordem das tags está correta
              if start_idx <= end_idx:
                  # Fatia o arquivo mantendo tudo antes e depois, injetando o payload no meio
                  updated_content = readme_content[:start_idx] + "\n" + stats_content.strip() + "\n" + readme_content[end_idx:]
                  
                  with open(readme_file, "w", encoding="utf-8") as f:
                      f.write(updated_content)
                  print("README atualizado com sucesso via index slice!")
              else:
                  print("Erro: A tag de fim está posicionada antes da tag de início.")
                  exit(1)
          else:
              print("Erro de barreira: As tags protetoras não foram encontradas no README.md!")
              exit(1)
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: atualiza estatísticas globais de texto [skip ci]"
          git push