name: Metrics
on:
  # Agenda a atualização a cada 6 horas
  schedule: [{cron: "0 */6 * * *"}]
  # Permite que você force a atualização manualmente pela aba Actions
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Token de segurança que você vai configurar (passo abaixo)
          token: ${{ secrets.METRICS_TOKEN }}

          # Configurações de saída
          filename: github-metrics.svg
          base: header, activity, community, repositories, metadata
          
          # PLUGIN: Linhas de código (Adicionadas e Removidas)
          plugin_lines: yes
          plugin_lines_sections: base, history
          
          # PLUGIN: Detalhes de linguagens e participação
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          
          # Configurações visuais adicionais
          config_timezone: America/Sao_Paulo
          theme: tokyonight