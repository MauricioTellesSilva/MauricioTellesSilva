name: Update Profile README Text Stats

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  update-readme:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Custom Text
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import re
          import requests

          token = os.getenv("GH_TOKEN")
          username = os.getenv("GH_USERNAME")

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json"
          }

          readme_file = None

          for f in os.listdir("."):
              if f.lower() == "readme.md":
                  readme_file = f
                  break

          if not readme_file:
              print("README.md não encontrado.")
              exit(1)

          # ---------------------------------------------
          # Estatísticas gerais
          # ---------------------------------------------

          search_commits_count = 0

          try:
              commit_search = requests.get(
                  f"https://api.github.com/search/commits?q=author:{username}",
                  headers=headers
              ).json()

              if "total_count" in commit_search:
                  search_commits_count = commit_search["total_count"]

          except Exception as e:
              print(f"Erro ao buscar commits: {e}")

          total_prs = 0

          try:
              pr_search = requests.get(
                  f"https://api.github.com/search/issues?q=author:{username}+type:pr",
                  headers=headers
              ).json()

              if "total_count" in pr_search:
                  total_prs = pr_search["total_count"]

          except Exception as e:
              print(f"Erro ao buscar PRs: {e}")

          # ---------------------------------------------
          # Repositórios
          # ---------------------------------------------

          unique_repos = set()
          page = 1

          while True:
              resp = requests.get(
                  f"https://api.github.com/user/repos?per_page=100&page={page}",
                  headers=headers
              )

              if resp.status_code != 200:
                  break

              repos = resp.json()

              if not repos:
                  break

              for repo in repos:
                  if not repo.get("fork"):
                      unique_repos.add(
                          (repo["owner"]["login"], repo["name"])
                      )

              page += 1

          total_additions = 0
          total_deletions = 0
          languages_map = {}

          for owner, repo in unique_repos:

              try:
                  stats = requests.get(
                      f"https://api.github.com/repos/{owner}/{repo}/stats/contributors",
                      headers=headers
                  )

                  if stats.status_code == 200:

                      data = stats.json()

                      if isinstance(data, list):
                          for contributor in data:

                              author = contributor.get("author")

                              if author and author.get("login", "").lower() == username.lower():

                                  for week in contributor.get("weeks", []):
                                      total_additions += week.get("a", 0)
                                      total_deletions += week.get("d", 0)

              except Exception:
                  pass

              try:
                  langs = requests.get(
                      f"https://api.github.com/repos/{owner}/{repo}/languages",
                      headers=headers
                  )

                  if langs.status_code == 200:

                      for lang, count in langs.json().items():
                          languages_map[lang] = (
                              languages_map.get(lang, 0) + count
                          )

              except Exception:
                  pass

          # ---------------------------------------------
          # Linguagens
          # ---------------------------------------------

          total_bytes = sum(languages_map.values())

          sorted_langs = sorted(
              languages_map.items(),
              key=lambda x: x[1],
              reverse=True
          )[:4]

          if total_bytes > 0:
              languages_formatted = ", ".join(
                  f"{lang} ({count / total_bytes * 100:.1f}%)"
                  for lang, count in sorted_langs
              )
          else:
              languages_formatted = "Identificando..."

          str_additions = f"{total_additions:,}"
          str_deletions = f"{total_deletions:,}"

          # Markdown compatível com GitHub
          stats_content = f"""
### 📈 Minhas Estatísticas de Desenvolvimento

* 🚀 **Repositórios:** Já contribuí com um total de **{search_commits_count} commits**.
* 🔀 **Pull Requests:** Foram abertos **{total_prs} Pull Requests**.
* 📊 **Linhas modificadas:** +{str_additions} adicionadas e -{str_deletions} removidas.
* 💻 **Linguagens utilizadas:** **{languages_formatted}**.

_Atualizado automaticamente via GitHub Actions._
"""

          # ---------------------------------------------
          # Atualização do README
          # ---------------------------------------------

          with open(readme_file, "r", encoding="utf-8") as f:
              readme_content = f.read()

          tag_start = "<!----start script---->"
          tag_end = "<!----end script---->"

          pattern = re.compile(
              re.escape(tag_start) + r".*?" + re.escape(tag_end),
              re.DOTALL
          )

          replacement = (
              f"{tag_start}\n"
              f"{stats_content}\n"
              f"{tag_end}"
          )

          if pattern.search(readme_content):

              updated_content = pattern.sub(
                  replacement,
                  readme_content
              )

              with open(readme_file, "w", encoding="utf-8") as f:
                  f.write(updated_content)

              print("README atualizado com sucesso!")

          else:
              print(
                  f"Tags não encontradas:\n"
                  f"{tag_start}\n"
                  f"{tag_end}"
              )
              exit(1)

          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          if ! git diff --cached --quiet; then
            git commit -m "docs: atualiza estatísticas globais [skip ci]"
            git push
          else
            echo "Nenhuma alteração detectada."
          fi