name: Update Profile README Text Stats
on:
  schedule:
    - cron: "0 */12 * * *" # Atualiza a cada 12 horas
  workflow_dispatch: # Permite rodar manualmente
  push:
    branches: ["main", "master"]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Custom Text
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GH_USERNAME: ${{ github.repository_owner }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import re
          import time

          token = os.getenv("GH_TOKEN")
          username = os.getenv("GH_USERNAME")
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}

          # 1. Buscar total de Commits e Pull Requests globais (Histórico completo)
          try:
              commit_search = requests.get(f"https://api.github.com/search/commits?q=author:{username}", headers=headers).json()
              total_commits = commit_search.get("total_count", 0)
          except:
              total_commits = "Disponível no painel"

          try:
              pr_search = requests.get(f"https://api.github.com/search/issues?q=author:{username}+type:pr", headers=headers).json()
              total_prs = pr_search.get("total_count", 0)
          except:
              total_prs = "Disponível no painel"

          # 2. Paginação para buscar absolutamente TODOS os repositórios da conta
          repos = []
          page = 1
          while True:
              repos_url = f"https://api.github.com/users/{username}/repos?per_page=100&page={page}"
              resp = requests.get(repos_url, headers=headers)
              if resp.status_code != 200:
                  break
              data = resp.json()
              if not data or not isinstance(data, list):
                  break
              repos.extend(data)
              if len(data) < 100: # Se veio menos de 100, significa que era a última página
                  break
              page += 1

          total_additions = 0
          total_deletions = 0
          languages_map = {}

          # 3. Varrer o histórico de cada repositório encontrado
          for repo in repos:
              if repo.get("fork"): 
                  continue # Ignora repositórios que são forks de outras pessoas
              repo_name = repo.get("name")
              
              # Este endpoint traz o array 'weeks' com TODAS as semanas desde a criação do repositório
              stats_url = f"https://api.github.com/repos/{username}/{repo_name}/stats/contributors"
              stats_resp = requests.get(stats_url, headers=headers)
              
              # O GitHub pode retornar status 202 na primeira vez se o repositório for muito antigo e não estiver no cache deles.
              # O script vai computar o que estiver pronto e nas próximas execuções acumulará o restante.
              if stats_resp.status_code == 200 and stats_resp.json():
                  for contributor in stats_resp.json():
                      if contributor.get("author", {}).get("login") == username:
                          for week in contributor.get("weeks", []):
                              total_additions += week.get("a", 0)
                              total_deletions += week.get("d", 0)
              
              # Contagem histórica de linguagens
              lang_url = f"https://api.github.com/repos/{username}/{repo_name}/languages"
              lang_resp = requests.get(lang_url, headers=headers)
              if lang_resp.status_code == 200:
                  for lang, bytes_count in lang_resp.json().items():
                      languages_map[lang] = languages_map.get(lang, 0) + bytes_count

          # Calcular porcentagem global das linguagens
          total_bytes = sum(languages_map.values())
          sorted_langs = sorted(languages_map.items(), key=lambda x: x[1], reverse=True)[:4]
          lang_text = []
          for lang, bytes_count in sorted_langs:
              percentage = (bytes_count / total_bytes) * 100 if total_bytes > 0 else 0
              lang_text.append(f"{lang} ({percentage:.1f}%)")
          
          languages_formatted = ", ".join(lang_text) if lang_text else "Identificando..."

          # =========================================================================
          # ✍️ TEXTO PERSONALIZADO COM CORES NOS NÚMEROS
          # =========================================================================
          custom_text = f"""### 📈 Minhas Estatísticas de Desenvolvimento (Histórico Completo)

          Desde a criação da minha conta, meu ecossistema de código conta com os seguintes números acumulados:
          * 🚀 **Repositorios:** Já contribuí com um total de **{total_commits} commits** repositorios.
          * 🔀 **Pulls:** Foram abertos **{total_prs} Pull Requests** .
          * 📊 **Commits:** Em toda a história dos meus repositórios, movimentei um total de $\\color{{#2ea44f}}{{\\mathbf{{+{total_additions:,}}}}}}$ **linhas adicionadas** e $\\color{{#f85149}}{{\\mathbf{{-{total_deletions:,}}}}}}$ **linhas removidas**.
          * 💻 **Linguagens de codigo usadas:** Participacao de linguagens utilizadas:**{languages_formatted}**.

          _Atualizado automaticamente via Python Script (Histórico Global)._
          """
          # =========================================================================

          # Injetar o texto gerado no README
          with open("README.md", "r", encoding="utf-8") as f:
              readme_content = f.read()

          pattern = r".*?"
          updated_content = re.sub(pattern, custom_text, readme_content, flags=re.DOTALL)

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(updated_content)
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: atualiza estatísticas globais de texto [skip ci]"
          git push